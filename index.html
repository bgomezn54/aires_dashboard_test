<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIRES Global Cloud Dashboard</title>
  
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1390.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-main: #190005; --bg-panel: #2b050d; --bg-panel-alt: #3a0712;
      --border-subtle: #4b0c18; --accent-blue: #a8d8ff; --accent-pink: #ff8ba7;
      --text-main: #fef3f5; --text-muted: #c9a9b4;
      --chip-bg: #3d0b16; --chip-bg-active: #5b1021;
    }
    body {
      font-family: system-ui, sans-serif;
      margin:16px;
      background: radial-gradient(circle at top left, #3b0916 0, #190005 45%, #070006 100%);
      color:var(--text-main);
    }
    .status-badge {
      display: inline-block; padding: 4px 8px; border-radius: 4px;
      background: #4b1515; font-size: 0.8rem; font-weight: bold; margin-bottom: 12px;
    }
    .label { font-size:0.8rem; text-transform:uppercase; opacity:0.8; color:var(--text-muted); }
    .value { font-size:1.1rem; font-weight:600; margin-top:4px; color:var(--text-main); }
    .cards { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:12px; }
    .card {
      background:linear-gradient(145deg,var(--bg-panel),var(--bg-panel-alt));
      border-radius:10px; padding:10px 12px; min-width:220px;
      box-shadow:0 6px 14px rgba(0,0,0,0.55); border:1px solid var(--border-subtle);
    }
    #hazardBox { border-radius:10px; padding:10px 12px; margin-top:8px; transition:background 0.2s; }
    #hazardBox.normal    { background:#12331f; }
    #hazardBox.warning   { background:#3b2a1f; }
    #hazardBox.dangerous { background:#4b1515; }
    .charts { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }
    .chart-card {
      background:linear-gradient(145deg,var(--bg-panel),var(--bg-panel-alt));
      border-radius:10px; padding:8px; flex:1 1 260px;
      box-shadow:0 6px 14px rgba(0,0,0,0.55); border:1px solid var(--border-subtle);
    }
    .chart-card canvas { width:100%; height:210px; }
  </style>
</head>
<body>
  <h1>AIRES Global Cloud Dashboard</h1>
  <div class="status-badge" id="connStatus">Authenticating with AWS...</div>

  <div class="cards">
    <div class="card">
      <div class="label">PM2.5</div>
      <div class="value"><span id="pm25Filtered">-</span> µg/m³</div>
      <div class="label">Status: <span id="pmStatus">-</span></div>
    </div>
    <div class="card">
      <div class="label">VOC Index</div>
      <div class="value"><span id="vocIndex">-</span></div>
      <div class="label">Status: <span id="vocStatus">-</span></div>
    </div>
    <div class="card">
      <div class="label">NOx Index</div>
      <div class="value"><span id="noxIndex">-</span></div>
      <div class="label">Status: <span id="noxStatus">-</span></div>
    </div>
    <div class="card">
      <div class="label">Environment</div>
      <div class="value"><span id="tempF">-</span> °F</div>
      <div class="label">Status: <span id="tempStatus">-</span></div>
    </div>
    <div class="card">
      <div class="label">Fan Duty</div>
      <div class="value"><span id="fanDuty">0</span> %</div>
    </div>
  </div>

  <div id="hazardBox" class="normal">
    <div class="label">Hazard Priority</div>
    <div class="value" id="hazardText">-</div>
  </div>

  <div class="charts">
    <div class="chart-card"><div class="label">PM2.5 (µg/m³)</div><canvas id="chartPm"></canvas></div>
    <div class="chart-card"><div class="label">VOC &amp; NOx Index</div><canvas id="chartGas"></canvas></div>
    <div class="chart-card"><div class="label">Env – Temp (°F)</div><canvas id="chartTemp"></canvas></div>
    <div class="chart-card"><div class="label">Fan Duty (%)</div><canvas id="chartFan"></canvas></div>
  </div>

  <script>
    // 1. Element Selectors
    const elConn = document.getElementById('connStatus');
    const elPm25 = document.getElementById('pm25Filtered'), elVoc = document.getElementById('vocIndex');
    const elNox = document.getElementById('noxIndex'), elTempF = document.getElementById('tempF');
    const elFan = document.getElementById('fanDuty'), elPmSt = document.getElementById('pmStatus');
    const elVocSt = document.getElementById('vocStatus'), elNoxSt = document.getElementById('noxStatus');
    const elTempSt = document.getElementById('tempStatus'), elHazBox = document.getElementById('hazardBox');
    const elHazTxt = document.getElementById('hazardText');

    const MAX_POINTS = 50; 
    let chartTime = 0;

    // 2. Chart Configurations
    function baseLineOptions(titleY, minY, maxY) {
      return {
        animation:false, responsive:true,
        scales: { x:{ title:{display:true, text:'Updates'} }, y:{ title:{display:true, text:titleY || ''}, min: minY, max: maxY } },
        plugins: { legend: { labels: { color:'#fef3f5' } } }
      };
    }

    const chartPm = new Chart(document.getElementById('chartPm').getContext('2d'), {
      type: 'line', data: { labels: [], datasets: [{ label: 'PM2.5', data: [], borderColor: '#a8d8ff', backgroundColor: 'rgba(168,216,255,0.2)', tension:0.4 }] }, options: baseLineOptions('µg/m³', null, null)
    });
    const chartGas = new Chart(document.getElementById('chartGas').getContext('2d'), {
      type: 'line', data: { labels: [], datasets: [{ label: 'VOC', data: [], borderColor: '#d2a0ff', tension:0.4 }, { label: 'NOx', data: [], borderColor: '#ffb7b2', tension:0.4 }] }, options: baseLineOptions('Index', 0, null)
    });
    const chartTemp = new Chart(document.getElementById('chartTemp').getContext('2d'), {
      type: 'line', data: { labels: [], datasets: [{ label: 'Temp (°F)', data: [], borderColor: '#add8e6', tension:0.4 }] }, options: baseLineOptions('°F', null, null)
    });
    const chartFan = new Chart(document.getElementById('chartFan').getContext('2d'), {
      type: 'line', data: { labels: [], datasets: [{ label: 'Fan Duty', data: [], borderColor: '#f8b4d9', tension:0.4 }] }, options: baseLineOptions('%', 0, 100)
    });

    function pushPoint(chart, values) {
      chart.data.labels.push(chartTime);
      chart.data.datasets.forEach((ds, i) => ds.data.push(values[i]));
      if (chart.data.labels.length > MAX_POINTS) { chart.data.labels.shift(); chart.data.datasets.forEach(ds => ds.data.shift()); }
      chart.update('none');
    }

    // 3. Logic Helpers
    function getPmLabel(val) { if(val<12) return 'normal'; if(val<35) return 'medium'; if(val<55) return 'high'; return 'dangerous'; }
    function getVocLabel(val) { if(val<140) return 'normal'; if(val<190) return 'medium'; if(val<240) return 'high'; return 'dangerous'; }
    function getNoxLabel(val) { if(val<140) return 'normal'; if(val<200) return 'medium'; if(val<280) return 'high'; return 'dangerous'; }
    function getTempLabel(val) { if(val<50) return 'dangerous (cold)'; if(val<80) return 'normal'; if(val<95) return 'high (hot)'; return 'dangerous (hot)'; }

    function handleIncomingData(data) {
        chartTime++;
        elPm25.textContent = data.pm25.toFixed(1);
        elVoc.textContent = data.voc; elNox.textContent = data.nox;
        elTempF.textContent = data.temp_f.toFixed(1); elFan.textContent = data.fan;
        elPmSt.textContent = getPmLabel(data.pm25); elVocSt.textContent = getVocLabel(data.voc);
        elNoxSt.textContent = getNoxLabel(data.nox); elTempSt.textContent = getTempLabel(data.temp_f);
        elHazTxt.textContent = "Current Level: " + data.hazard.toUpperCase();
        elHazBox.className = data.hazard;
        pushPoint(chartPm, [data.pm25]); pushPoint(chartGas, [data.voc, data.nox]);
        pushPoint(chartTemp, [data.temp_f]); pushPoint(chartFan, [data.fan]);
    }

    // 4. Secure Signing Helper (Signature V4)
    function getSignedUrl(endpoint, region, credentials) {
        const datetime = new Date().toISOString().replace(/[:-]|\.\d{3}/g, '');
        const date = datetime.substr(0, 8);
        const method = 'GET';
        const service = 'iotdevicegateway';
        const host = endpoint.toLowerCase();
        const path = '/mqtt';
        const query = `X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=${credentials.accessKeyId}%2F${date}%2F${region}%2F${service}%2Faws4_request&X-Amz-Date=${datetime}&X-Amz-Expires=86400&X-Amz-SignedHeaders=host`;
        
        const canonicalRequest = `${method}\n${path}\n${query}\nhost:${host}\n\nhost\ne3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855`;
        const stringToSign = `AWS4-HMAC-SHA256\n${datetime}\n${date}/${region}/${service}/aws4_request\n${CryptoJS.SHA256(canonicalRequest).toString()}`;
        
        const kDate = CryptoJS.HmacSHA256(date, "AWS4" + credentials.secretKey);
        const kRegion = CryptoJS.HmacSHA256(region, kDate);
        const kService = CryptoJS.HmacSHA256(service, kRegion);
        const kSigning = CryptoJS.HmacSHA256("aws4_request", kService);
        const signature = CryptoJS.HmacSHA256(stringToSign, kSigning).toString();
        
        return `wss://${host}${path}?${query}&X-Amz-Signature=${signature}&X-Amz-Security-Token=${encodeURIComponent(credentials.sessionToken)}`;
    }

    // 5. AWS Connection Initialization
    AWS.config.region = 'us-west-2';
    AWS.config.credentials = new AWS.CognitoIdentityCredentials({
        IdentityPoolId: 'us-west-2:770d786c-9f6e-43d6-956e-3f59c0057ec8',
    });

    AWS.config.credentials.get(function(err) {
        if (err) {
            elConn.textContent = "Auth Error: Check Identity Pool ID";
            elConn.style.background = "#ff0000";
            return;
        }

        const iotEndpoint = 'a1hdvz5vhv22bb-ats.iot.us-west-2.amazonaws.com';
        
        // Generate the Signed URL for WebSockets
        const signedUrl = getSignedUrl(iotEndpoint, 'us-west-2', {
            accessKeyId: AWS.config.credentials.accessKeyId,
            secretKey: AWS.config.credentials.secretAccessKey,
            sessionToken: AWS.config.credentials.sessionToken
        });

        // Use MQTT.js for the connection
        const client = mqtt.connect(signedUrl);

        client.on('connect', function () {
            elConn.textContent = "LIVE: Secure AWS Bridge Active";
            elConn.style.background = "#12331f";
            client.subscribe('aires/sensors');
        });

        client.on('message', function (topic, payload) {
            const sensorData = JSON.parse(payload.toString());
            handleIncomingData(sensorData);
        });

        client.on('error', function (error) {
            console.error("MQTT Connection Error:", error);
            elConn.textContent = "Connection Failed";
            elConn.style.background = "#4b1515";
        });
        
        client.on('close', function () {
            elConn.textContent = "Disconnected - Retrying...";
            elConn.style.background = "#4b1515";
        });
    });
  </script>
</body>
</html>
